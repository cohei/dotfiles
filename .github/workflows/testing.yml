name: Testing

on: push

permissions:
  contents: read

jobs:
  local-activate-test:
    runs-on: ubuntu-latest
    steps:
      - uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: docker compose run development nix run
  local-darwin-activate-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: NixOS/nix-installer-action@62c1943b776c509394b550f3f983adc14e9212d6 # main
      - name: Prepare for nix-darwin
        run: |
          sudo scutil --set LocalHostName sandbox-mac
          sudo rm /etc/nix/nix.conf /etc/nix/nix.custom.conf /etc/shells
      - run: sudo nix --extra-experimental-features "nix-command flakes" run
        timeout-minutes: 20
  network-activate-test:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: docker compose run development nix run github:cohei/dotfiles
