"$schema" = 'https://starship.rs/config-schema.json'

format = "$git_branch$git_commit$git_state$git_metrics$git_status"
add_newline = false

[git_branch]
style = "white"
format = "on [$symbol$branch]($style) "

[git_commit]
style = "white"

[git_metrics]
disabled = false

[git_state]
style = "bold white"

[git_status]
style = "white"
